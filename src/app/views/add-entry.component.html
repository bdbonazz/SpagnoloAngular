<div class="container">
    <h2>Aggiungi Nuovo Contenuto</h2>

    <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
        <!-- Selezione Tipo -->
        <div class="form-group">
            <label>Cosa vuoi aggiungere?</label>
            <select formControlName="tipo" class="form-control">
                <option value="parola">Una Parola</option>
                <option value="verbo">Un Verbo</option>
            </select>
        </div>

        <!-- Termine e Traduzione -->
        <div class="form-group">
            <label>Termine (Spagnolo)</label>
            <input type="text" formControlName="spagnolo" #spagnolo class="form-control" placeholder="es: Mesa / Comer">
        </div>

        <div class="form-group">
            <label>Traduzione (Italiano)</label>
            <input type="text" formControlName="italiano" class="form-control" placeholder="es: Tavolo / Mangiare">
        </div>

        <!-- Sezione Declinazione (visibile solo per i verbi) -->
        <div *ngIf="entryForm.get('tipo')?.value === 'verbo'" formGroupName="coniugazione" class="conjugation-grid">
            <h3>Declinazione (Presente)</h3>
            <div class="grid-inputs">
                <input type="text" formControlName="yo" placeholder="Yo">
                <input type="text" formControlName="tu" placeholder="Tú">
                <input type="text" formControlName="el" placeholder="Él/Ella">
                <input type="text" formControlName="nosotros" placeholder="Nosotros">
                <input type="text" formControlName="vosotros" placeholder="Vosotros">
                <input type="text" formControlName="ellos" placeholder="Ellos/Ellas">
            </div>
        </div>

        <button type="submit" [disabled]="entryForm.invalid" class="btn-submit">
            Salva nel Vocabolario
        </button>

        <p *ngIf="successMessage" class="success-alert">{{ successMessage }}</p>
    </form>
</div>
