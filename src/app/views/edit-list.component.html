<div class="list-container">
  <h2>Gestione Vocabolario</h2>

  <table class="vocab-table">
    <thead>
      <tr>
        <th>Termine</th>
        <th>Traduzione</th>
        <th>Tipo</th>
        <th>Azioni</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let v of vocaboli">
        <td><strong>{{ v.spagnolo }}</strong></td>
        <td>{{ v.italiano }}</td>
        <td><span class="type-tag" [class.verbo]="v.tipo === 'verbo'">{{ v.tipo }}</span></td>
        <td>
          <button class="btn-edit" (click)="openEdit(v)">Modifica</button>
          <button class="btn-delete" (click)="onDelete(v)">Elimina</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Modale di Modifica (Custom Dialog) -->
  <div class="modal-overlay" *ngIf="showEditDialog && selectedVocabolo">
    <div class="modal-content">
      <h3>Modifica Elemento</h3>
      
      <div class="form-grid">
        <label>Termine Spagnolo</label>
        <input [(ngModel)]="selectedVocabolo.spagnolo">

        <label>Traduzione Italiana</label>
        <input [(ngModel)]="selectedVocabolo.italiano">

        <!-- Se è un verbo, mostra i campi declinazione -->
        <ng-container *ngIf="selectedVocabolo.tipo === 'verbo'">
            <ng-container *ngFor="let coniugazione of selectedVocabolo.coniugazioni">
                <label>Yo</label> <input [(ngModel)]="coniugazione.yo">
                <label>Tú</label> <input [(ngModel)]="coniugazione.tu">
                <label>Él</label> <input [(ngModel)]="coniugazione.el">
                <label>Nos.</label> <input [(ngModel)]="coniugazione.nosotros">
                <label>Vos.</label> <input [(ngModel)]="coniugazione.vosotros">
                <label>Ellos</label> <input [(ngModel)]="coniugazione.ellos">
            </ng-container>
        </ng-container>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" (click)="closeEdit()">Annulla</button>
        <button class="btn-save" (click)="saveEdit()">Salva Modifiche</button>
      </div>
    </div>
  </div>
</div>
